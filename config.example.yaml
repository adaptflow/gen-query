# Example configuration for GenQuery

# connection_string: "postgresql://user:password@localhost:5432/dbname"
schema: "public"

table_filters:
  include:
    # - "users"
    # - "orders"
  exclude:
    # - "passwords"
    # - "secrets"

prompts:
  ranker_prompt_path: "prompts/ranker_prompt.txt"
  planner_prompt_path: "prompts/planner_prompt.txt"
  generator_prompt_path: "prompts/generator_prompt.txt"

# Row Level Security Policies (Postgres session or AST injection)
# rls_policies:
#   - column: "tenant_id"
#     value: "customer_123"
#     session_variable: "app.tenant_id"
#   - column: "user_id"
#     value: "user_456"
#     session_variable: "app.user_id"

# Query execution constraints
statement_timeout_ms: 15000
row_limit: 1000

# Cache configurations
schema_cache_ttl_seconds: 3600
schema_cache_dir: ".gq_cache"
